name: Matrix
on:
    push:
        branches: [main]
jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix: 
              python-version: [3.10, 3.11, 3.12]
        steps:
         - name: checkout code
           uses: actions/checkout@v4
           
         - name: setup python
           uses: actions/setup-python@v5
           with: 
             python-version: ${{ matrix.python-version }}

         - name: Print Python-Version
           run: python --version
             
        
