name: PR_Check

on: 
    pull_request:
        branches: [main]
        types: [opened, synchronize]

jobs:
    pr_check:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout-code
        uses: actions/checkout@v4
         
      - name: Print PR Branch
        run: echo "PR check running for branch: ${{ github.head_ref }}"
    
    

