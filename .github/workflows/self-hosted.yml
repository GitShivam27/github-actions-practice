name: Self-Hosted-Runner

on: 
    workflow_dispatch:

jobs:
    self-hosted-EC2:
    
        runs-on: [self-hosted, my-linux-runner]

        steps:
              
            - name: Print Hostname
              run: hostname

            - name: Print the working directory
              run: pwd

            - name: Create File and Verify 
              run : |
                  echo "Hello From Runner" > test.txt

            - name: Verify file exists
              run: cat test.txt
        
