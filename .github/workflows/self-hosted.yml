name: Self-Hosted-Runner

on: 
    workflow_dispatch:

jobs:
    self-hosted-EC2:
    
        runs-on: self-hosted

        defaults:
          run:
              working-directory: /path/on/your/machine

        steps:

            - name: Run a script
              run: ./script.sh 
              
            - name: Print Hostname
              run: hostname

            - name: Print the working directory
              run: pwd

            - name: Create File and Verify 
              run : |
                  echo "Hello world" > test.txt
        
